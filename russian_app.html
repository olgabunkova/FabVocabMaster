<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="RusMaster">
    <meta name="theme-color" content="#2c3e50">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="./src/styles.css">
    <title>Russian Vocab Master</title>
</head>
<body>

<div class="container">

    <!-- Setup screen -->
    <div id="setup-screen">
        <h1>Russian Master</h1>
        <p class="love-note" aria-label="love message">Made with love for you, Fabian❤️</p>

        <div id="server-instructions" class="hidden info-box">
            <strong>🚀 Start the local server</strong>
            Open a terminal in this folder and run:
            <code style="display:block; margin: 10px 0; background:#fff; padding:10px; border-radius:8px;">python3 local_server.py</code>
            Then open <code>http://localhost:8000/russian_app.html</code> in your browser.
        </div>

        <div id="topic-container" class="hidden">
            <h3 style="margin-bottom:10px;">Select topics:</h3>
            <div id="topic-list" class="topic-list"></div>
            <button class="btn btn-success" id="start-btn">Start Practice</button>
        </div>
    </div>

    <!-- Quiz screen -->
    <div id="quiz-screen" class="hidden">
        <div class="stats-row">
            <span id="score-text">Score: 0</span>
            <span id="queue-text">Cards Left: 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>

        <div class="card">
            <div id="mode-label" style="color:var(--accent); font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;"></div>
            <div class="word-display" id="target-word"></div>
            <div class="pron-display" id="target-pron"></div>
            <div id="speech-controls" class="speech-controls hidden">
                <button class="btn btn-ghost speech-btn" id="speak-slow-btn" type="button">🔊 Slow</button>
                <button class="btn btn-ghost speech-btn" id="speak-fast-btn" type="button">🔊 Fast</button>
            </div>
            <!-- Multiple choice -->
            <div id="mc-ui" class="options-grid hidden"></div>

            <!-- Open recall -->
            <div id="open-ui" class="hidden">
                <div class="open-actions">
                    <button class="btn btn-primary" id="ans-reveal-btn" type="button">Show Answer</button>
                </div>
                <div id="ans-box" class="hidden">
                    <h2 id="correct-ans"></h2>
                    <div id="ans-speech-controls" class="speech-controls hidden">
                        <button class="btn btn-ghost speech-btn" id="ans-speak-slow-btn" type="button">🔊 Slow</button>
                        <button class="btn btn-ghost speech-btn" id="ans-speak-fast-btn" type="button">🔊 Fast</button>
                    </div>
                    <p style="font-weight:bold; color:#64748b;">Did you get it right?</p>
                    <div class="self-check-row">
                        <button class="btn btn-success" id="yes-btn">Yes ✓</button>
                        <button class="btn btn-error"   id="no-btn">No ✗</button>
                    </div>
                </div>
            </div>

            <button id="skip-btn" class="btn btn-ghost">I don't know</button>
        </div>
        <button id="main-menu-btn" class="btn btn-primary">Back to Menu</button>
    </div>

</div>

<!-- Modal -->
<div id="custom-modal" role="dialog" aria-modal="true">
    <div class="modal-content">
        <h2 id="modal-title">Notice</h2>
        <p id="modal-body"></p>
        <button class="btn btn-primary" id="modal-ok-btn">Got it</button>
    </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
