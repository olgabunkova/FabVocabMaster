<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russian Vocab Master</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #3498db; 
            --success: #27ae60; 
            --error: #e74c3c; 
            --warning: #f39c12;
            --muted: #94a3b8;
            --bg: #f8fafc; 
            --card-bg: #ffffff;
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: var(--primary); }
        .container { background: var(--card-bg); padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); width: 90%; max-width: 550px; position: relative; }
        
        h1 { margin-top: 0; font-weight: 800; letter-spacing: -1px; text-align: center; color: var(--primary); }
        
        .info-box { background: #ebf8ff; border-left: 4px solid var(--accent); padding: 20px; border-radius: 12px; margin: 20px 0; font-size: 0.9rem; line-height: 1.5; }
        .info-box code { background: rgba(0,0,0,0.05); padding: 2px 5px; border-radius: 4px; font-family: monospace; font-weight: bold; }
        .info-box strong { display: block; margin-bottom: 5px; color: var(--accent); font-size: 1rem; }
        
        .btn { border: none; padding: 14px 24px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 700; font-size: 1rem; transition: all 0.2s ease; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        .btn-success { background: var(--success); color: white; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); }
        .btn-error { background: var(--error); color: white; }
        .btn-ghost { background: transparent; color: var(--muted); border: 2px solid #e2e8f0; margin-top: 20px; }
        .btn-ghost:hover { background: #f1f5f9; color: var(--primary); }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .topic-list { margin: 20px 0; max-height: 200px; overflow-y: auto; border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px; }
        .topic-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .topic-item:hover { background: #f8fafc; }

        .card { text-align: center; padding: 10px 0; }
        .word-display { font-size: 3rem; font-weight: 800; margin-bottom: 5px; color: var(--primary); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .option-btn { padding: 16px; border: 2px solid #f1f5f9; border-radius: 15px; background: white; cursor: pointer; font-size: 1.1rem; font-weight: 800; transition: 0.2s; }
        .option-btn:hover { border-color: var(--accent); background: #f0f9ff; color: var(--accent); }
        
        #custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s; }
        #custom-modal.active { visibility: visible; opacity: 1; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; width: 80%; }

        .progress-bar { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.4s; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>Russian Master</h1>
        
        <div id="server-instructions" class="hidden info-box">
            <strong>🚀 Ready to start?</strong>
            To load your vocab automatically, please run a local server in this folder:
            <code style="display:block; margin: 10px 0; background: #fff; padding: 10px; border-radius: 8px;">python3 -m http.server 8000</code>
        </div>

        <div id="topic-container" class="hidden">
            <h3 style="margin-bottom:10px;">Select topics:</h3>
            <div id="topic-list" class="topic-list"></div>
            <button class="btn btn-success" onclick="startSession()">Start Practice</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 0.8rem; color: var(--muted); text-transform: uppercase;">
            <span id="score-text">Score: 0</span>
            <span id="queue-text">Cards Left: 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="card">
            <div id="mode-label" style="color:var(--accent); font-size:0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;"></div>
            <div class="word-display" id="target-word"></div>
            <div id="target-pron" style="color: var(--muted); font-style: italic; font-size: 1.1rem; min-height: 1.5rem;"></div>

            <div id="mc-ui" class="options-grid"></div>

            <div id="open-ui" class="hidden">
                <button class="btn btn-primary" onclick="showOpenAnswer()">Show Answer</button>
                <div id="ans-box" class="hidden" style="margin-top: 20px;">
                    <h2 id="correct-ans" style="color:var(--success); margin-bottom: 20px; font-size: 2rem;"></h2>
                    <p style="font-weight: bold; color: #64748b;">Did you get it right?</p>
                    <div style="display:flex; gap:12px;">
                        <button class="btn btn-success" onclick="handleResult(true)">Yes</button>
                        <button class="btn btn-error" onclick="handleResult(false)">No</button>
                    </div>
                </div>
            </div>

            <button id="skip-btn" class="btn btn-ghost" onclick="handleIDontKnow()">I don't know</button>
        </div>
    </div>
</div>

<div id="custom-modal">
    <div class="modal-content">
        <h2 id="modal-title">Notice</h2>
        <p id="modal-body" style="color: #64748b; margin-bottom: 25px;"></p>
        <button class="btn btn-primary" onclick="closeModal()">Got it</button>
    </div>
</div>

<script>
    let rawFileData = {}; 
    let masterList = [];
    let queue = [];
    let score = 0;
    let totalAtStart = 0;

    const formatName = (n) => n.replace('.txt', '').replace(/_/g, ' ').toUpperCase();

    function showAlert(title, body, onConfirm = null) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerText = body;
        const modal = document.getElementById('custom-modal');
        modal.classList.add('active');
        window.modalCallback = onConfirm;
    }

    function closeModal() {
        document.getElementById('custom-modal').classList.remove('active');
        if(window.modalCallback) window.modalCallback();
    }

    document.addEventListener('DOMContentLoaded', async () => {
        if (location.protocol === 'file:') {
            document.getElementById('server-instructions').classList.remove('hidden');
            return;
        }
        const ok = await attemptAutoLoadTopics();
        if (!ok) document.getElementById('server-instructions').classList.remove('hidden');
    });

    async function attemptAutoLoadTopics() {
        try {
            const res = await fetch('./topics/');
            if (!res.ok) return false;
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const links = Array.from(doc.querySelectorAll('a'))
                .map(a => a.getAttribute('href'))
                .filter(h => h && h.toLowerCase().endsWith('.txt'))
                .map(h => h.split('/').pop());
            return await loadTopicsFromList(links);
        } catch (err) { return false; }
    }

    async function loadTopicsFromList(names) {
        rawFileData = {};
        const listDiv = document.getElementById('topic-list');
        listDiv.innerHTML = '';
        for (const name of names) {
            try {
                const r = await fetch(`./topics/${name}`);
                const text = await r.text();
                rawFileData[name] = text;
                const div = document.createElement('div');
                div.className = 'topic-item';
                div.innerHTML = `<input type="checkbox" class="topic-cb" id="${name}" checked style="width:18px; height:18px;">
                                 <label style="margin-left:12px; cursor:pointer; font-weight:600;" for="${name}">${formatName(name)}</label>`;
                listDiv.appendChild(div);
            } catch (e) {}
        }
        if (Object.keys(rawFileData).length > 0) {
            document.getElementById('topic-container').classList.remove('hidden');
            return true;
        }
        return false;
    }

    function startSession() {
        masterList = [];
        const checkboxes = document.querySelectorAll('.topic-cb:checked');
        checkboxes.forEach(cb => {
            const text = rawFileData[cb.id];
            text.split('\n').filter(l => l.includes(',')).forEach(l => {
                const p = l.split(',').map(s => s.trim());
                masterList.push({ question: p[0], answer: p[1], pron: p[2] || "", dir: "Eng ➔ Rus" });
                masterList.push({ question: p[1], answer: p[0], pron: p[2] || "", dir: "Rus ➔ Eng" });
            });
        });

        if (masterList.length === 0) {
            showAlert("Empty Topic", "Please select a topic with vocabulary.");
            return;
        }
        queue = [...masterList].sort(() => Math.random() - 0.5);
        totalAtStart = queue.length;
        score = 0;
        document.getElementById('score-text').innerText = `Score: 0`;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        nextQuestion();
    }

    function nextQuestion() {
        if (queue.length === 0) {
            showAlert("🎉 All Done!", `Final Score: ${score}/${totalAtStart}`, () => {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('setup-screen').classList.remove('hidden');
            });
            return;
        }
        
        document.getElementById('progress-fill').style.width = `${((totalAtStart - queue.length) / totalAtStart) * 100}%`;
        document.getElementById('queue-text').innerText = `Cards Left: ${queue.length}`;
        document.getElementById('skip-btn').classList.remove('hidden');
        
        const item = queue[0];
        document.getElementById('target-word').innerText = item.question.toLowerCase();
        document.getElementById('target-pron').innerText = (item.dir === "Rus ➔ Eng" && item.pron) ? `[${item.pron.toLowerCase()}]` : "";
        document.getElementById('ans-box').classList.add('hidden');
        
        const mode = (Math.random() > 0.4 && masterList.length >= 8) ? 'mc' : 'open';
        if (mode === 'mc') setupMC(item); else setupOpen(item);
    }

    function setupMC(item) {
        document.getElementById('mode-label').innerText = "Multiple Choice";
        document.getElementById('mc-ui').classList.remove('hidden');
        document.getElementById('open-ui').classList.add('hidden');
        
        let choices = [item.answer];
        let potentialDistractors = masterList.filter(m => m.dir === item.dir).map(m => m.answer);
        while (choices.length < 4 && choices.length < potentialDistractors.length) {
            let rand = potentialDistractors[Math.floor(Math.random() * potentialDistractors.length)];
            if (!choices.includes(rand)) choices.push(rand);
        }
        choices.sort(() => Math.random() - 0.5);

        const container = document.getElementById('mc-ui');
        container.innerHTML = '';
        choices.forEach(c => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = c.toLowerCase();
            b.onclick = () => {
                if (c === item.answer) { 
                    score++; 
                    document.getElementById('score-text').innerText = `Score: ${score}`;
                    handleResult(true); 
                } else { 
                    showAlert("Not quite!", `The correct answer was: ${item.answer}`, () => handleResult(false));
                }
            };
            container.appendChild(b);
        });
    }

    function setupOpen(item) {
        document.getElementById('mode-label').innerText = "Open Recall";
        document.getElementById('mc-ui').classList.add('hidden');
        document.getElementById('open-ui').classList.remove('hidden');
        if (item.dir === "Eng ➔ Rus" && item.pron) {
            document.getElementById('correct-ans').innerHTML = `${item.answer.toLowerCase()}<div style="color: var(--accent); font-style: italic; font-size:1rem; margin-top:8px;">[${item.pron.toLowerCase()}]</div>`;
        } else {
            document.getElementById('correct-ans').innerText = item.answer.toLowerCase();
        }
    }

    function showOpenAnswer() {
        document.getElementById('ans-box').classList.remove('hidden');
        document.getElementById('skip-btn').classList.add('hidden'); // Hide skip once answer is shown
    }

    function handleIDontKnow() {
        const item = queue[0];
        showAlert("Study This Word", `The answer is: ${item.answer}`, () => {
            handleResult(false);
        });
    }

    function handleResult(correct) {
        const item = queue.shift();
        if (!correct) queue.push(item);
        nextQuestion();
    }
</script>
</body>
</html>
