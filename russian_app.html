<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="RusMaster">
    <meta name="theme-color" content="#2c3e50">
    <link rel="manifest" href="manifest.json">
    <title>Russian Vocab Master</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --muted: #94a3b8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            color: var(--primary);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .container {
            background: var(--card-bg);
            padding: clamp(1.25rem, 5vw, 2.5rem);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            width: 95%;
            max-width: 550px;
            margin: clamp(0.5rem, 3vw, 2rem) auto;
        }

        h1 {
            margin-top: 0;
            font-weight: 800;
            letter-spacing: -1px;
            text-align: center;
            color: var(--primary);
            font-size: clamp(1.5rem, 5vw, 2rem);
        }

        .info-box {
            background: #ebf8ff;
            border-left: 4px solid var(--accent);
            padding: 16px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .info-box code {
            background: rgba(0,0,0,0.05);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            word-break: break-all;
        }
        .info-box strong { display: block; margin-bottom: 5px; color: var(--accent); font-size: 1rem; }

        /* Buttons */
        .btn {
            border: none;
            padding: clamp(12px, 3vw, 16px) 24px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-size: clamp(0.95rem, 3vw, 1rem);
            transition: transform 0.15s ease, opacity 0.15s ease;
            margin-top: 10px;
            /* Prevent double-tap zoom on iOS */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(52,152,219,0.3); }
        .btn-success { background: var(--success); color: white; box-shadow: 0 4px 15px rgba(39,174,96,0.3); }
        .btn-error   { background: var(--error);   color: white; }
        .btn-ghost   { background: transparent; color: var(--muted); border: 2px solid #e2e8f0; margin-top: 20px; }
        .btn:active  { transform: scale(0.97); opacity: 0.85; }
        @media (hover: hover) {
            .btn:hover { transform: translateY(-2px); opacity: 0.9; }
            .btn-ghost:hover { background: #f1f5f9; color: var(--primary); }
        }

        /* Topic list */
        .topic-list {
            margin: 20px 0;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            padding: 8px;
            border-radius: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .topic-item {
            display: flex;
            align-items: center;
            padding: clamp(10px, 3vw, 14px) 10px;
            border-bottom: 1px solid #f1f5f9;
            gap: 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .topic-item:last-child { border-bottom: none; }
        .topic-item:active { background: #f1f5f9; }
        @media (hover: hover) { .topic-item:hover { background: #f8fafc; } }
        .topic-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .topic-item label { font-weight: 600; cursor: pointer; flex: 1; }

        /* Quiz card */
        .card { text-align: center; padding: 10px 0; }
        .word-display {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 800;
            margin-bottom: 5px;
            color: var(--primary);
            line-height: 1.2;
            word-break: break-word;
        }
        .pron-display {
            color: var(--muted);
            font-style: italic;
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            min-height: 1.5rem;
        }

        /* Multiple choice grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(8px, 2vw, 12px);
            margin-top: 20px;
        }
        .option-btn {
            padding: clamp(14px, 4vw, 18px) 10px;
            border: 2px solid #f1f5f9;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            font-weight: 800;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            word-break: break-word;
            line-height: 1.3;
        }
        .option-btn:active { border-color: var(--accent); background: #f0f9ff; color: var(--accent); }
        @media (hover: hover) {
            .option-btn:hover { border-color: var(--accent); background: #f0f9ff; color: var(--accent); }
        }

        /* Open recall */
        #ans-reveal-btn { margin-top: 20px; }
        #ans-box { margin-top: 20px; }
        #correct-ans { color: var(--success); margin-bottom: 16px; font-size: clamp(1.5rem, 6vw, 2rem); }
        .self-check-row { display: flex; gap: 12px; }
        .self-check-row .btn { flex: 1; }

        /* Progress bar */
        .progress-bar { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.4s; }

        /* Stats row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: clamp(0.7rem, 2.5vw, 0.8rem);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Modal */
        #custom-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.25s, visibility 0.25s;
            padding: 1rem;
        }
        #custom-modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: white;
            padding: clamp(20px, 5vw, 30px);
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 380px;
        }
        .modal-content h2 { margin-top: 0; }
        .modal-content p { color: #64748b; margin-bottom: 20px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">

    <!-- Setup screen -->
    <div id="setup-screen">
        <h1>Russian Master</h1>

        <div id="server-instructions" class="hidden info-box">
            <strong>🚀 Start the local server</strong>
            Open a terminal in this folder and run:
            <code style="display:block; margin: 10px 0; background:#fff; padding:10px; border-radius:8px;">python3 local_server.py</code>
            Then open <code>http://localhost:8000/russian_app.html</code> in your browser.
        </div>

        <div id="topic-container" class="hidden">
            <h3 style="margin-bottom:10px;">Select topics:</h3>
            <div id="topic-list" class="topic-list"></div>
            <button class="btn btn-success" id="start-btn">Start Practice</button>
        </div>
    </div>

    <!-- Quiz screen -->
    <div id="quiz-screen" class="hidden">
        <div class="stats-row">
            <span id="score-text">Score: 0</span>
            <span id="queue-text">Cards Left: 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>

        <div class="card">
            <div id="mode-label" style="color:var(--accent); font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;"></div>
            <div class="word-display" id="target-word"></div>
            <div class="pron-display" id="target-pron"></div>

            <!-- Multiple choice -->
            <div id="mc-ui" class="options-grid hidden"></div>

            <!-- Open recall -->
            <div id="open-ui" class="hidden">
                <button class="btn btn-primary" id="ans-reveal-btn">Show Answer</button>
                <div id="ans-box" class="hidden">
                    <h2 id="correct-ans"></h2>
                    <p style="font-weight:bold; color:#64748b;">Did you get it right?</p>
                    <div class="self-check-row">
                        <button class="btn btn-success" id="yes-btn">Yes ✓</button>
                        <button class="btn btn-error"   id="no-btn">No ✗</button>
                    </div>
                </div>
            </div>

            <button id="skip-btn" class="btn btn-ghost">I don't know</button>
        </div>
    </div>

</div>

<!-- Modal -->
<div id="custom-modal" role="dialog" aria-modal="true">
    <div class="modal-content">
        <h2 id="modal-title">Notice</h2>
        <p id="modal-body"></p>
        <button class="btn btn-primary" id="modal-ok-btn">Got it</button>
    </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
const state = {
    rawFileData: {},   // filename → raw text
    masterList:  [],   // all card pairs
    queue:       [],   // remaining cards this session
    score:       0,
    totalAtStart: 0,
    modalCallback: null,
};

// ── Helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const formatName = name => name.replace(/\.txt$/i, '').replace(/_/g, ' ').toUpperCase();

function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }

function showModal(title, bodyHTML, onConfirm = null) {
    $('modal-title').innerHTML = title;
    $('modal-body').innerHTML  = bodyHTML;
    $('custom-modal').classList.add('active');
    state.modalCallback = onConfirm;
}

function closeModal() {
    $('custom-modal').classList.remove('active');
    const cb = state.modalCallback;
    state.modalCallback = null;
    if (cb) cb();
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    // Wire up static buttons once
    $('start-btn').addEventListener('click', startSession);
    $('ans-reveal-btn').addEventListener('click', showOpenAnswer);
    $('yes-btn').addEventListener('click', () => handleResult(true));
    $('no-btn').addEventListener('click', () => handleResult(false));
    $('skip-btn').addEventListener('click', handleIDontKnow);
    $('modal-ok-btn').addEventListener('click', closeModal);

    if (location.protocol === 'file:') {
        show('server-instructions');
        return;
    }
    const ok = await loadTopics();
    if (!ok) show('server-instructions');
});

// ── Topic loading (uses index.json — no directory scraping) ────────────────
async function loadTopics() {
    let names;
    try {
        const res = await fetch('./topics/index.json');
        if (!res.ok) return false;
        names = await res.json();
        if (!Array.isArray(names) || names.length === 0) return false;
    } catch {
        return false;
    }

    state.rawFileData = {};
    const listDiv = $('topic-list');
    listDiv.innerHTML = '';

    // Fetch all files in parallel
    await Promise.all(names.map(async name => {
        try {
            const r = await fetch(`./topics/${name}`);
            if (!r.ok) return;
            state.rawFileData[name] = await r.text();

            const item = document.createElement('div');
            item.className = 'topic-item';

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'topic-cb';
            cb.id = name;
            cb.checked = false; // Default to unselected; user opts in per topic

            const lbl = document.createElement('label');
            lbl.htmlFor = name;
            lbl.textContent = formatName(name);

            // Tapping the row label area toggles the checkbox.
            // We stop propagation on the checkbox itself so its native
            // click doesn't bubble up and fire the row handler too
            // (which would toggle it a second time, undoing the change).
            cb.addEventListener('click', e => e.stopPropagation());
            item.addEventListener('click', () => { cb.checked = !cb.checked; });

            item.append(cb, lbl);
            listDiv.appendChild(item);
        } catch { /* skip unreadable files */ }
    }));

    if (Object.keys(state.rawFileData).length === 0) return false;
    show('topic-container');
    return true;
}

// ── Session start ──────────────────────────────────────────────────────────
function parseCards(text) {
    const cards = [];
    for (const line of text.split('\n')) {
        const firstComma  = line.indexOf(',');
        if (firstComma === -1) continue;
        const secondComma = line.indexOf(',', firstComma + 1);
        const eng  = line.slice(0, firstComma).trim();
        const rus  = (secondComma === -1 ? line.slice(firstComma + 1) : line.slice(firstComma + 1, secondComma)).trim();
        const pron = secondComma === -1 ? '' : line.slice(secondComma + 1).trim();
        if (eng && rus) cards.push({ eng, rus, pron });
    }
    return cards;
}

function startSession() {
    const checked = [...document.querySelectorAll('.topic-cb:checked')];
    const cards = checked.flatMap(cb => parseCards(state.rawFileData[cb.id] || ''));

    if (cards.length === 0) {
        showModal('Empty Selection', 'Please select at least one topic with vocabulary.');
        return;
    }

    // Build both directions
    state.masterList = cards.flatMap(({ eng, rus, pron }) => [
        { question: eng, answer: rus, pron, dir: 'Eng ➔ Rus' },
        { question: rus, answer: eng, pron, dir: 'Rus ➔ Eng' },
    ]);

    state.queue        = [...state.masterList].sort(() => Math.random() - 0.5);
    state.totalAtStart = state.queue.length;
    state.score        = 0;

    $('score-text').textContent = 'Score: 0';
    hide('setup-screen');
    show('quiz-screen');
    nextQuestion();
}

// ── Quiz flow ──────────────────────────────────────────────────────────────
function nextQuestion() {
    if (state.queue.length === 0) {
        showModal('🎉 All Done!', `Final Score: ${state.score}/${state.totalAtStart}`, () => {
            hide('quiz-screen');
            show('setup-screen');
        });
        return;
    }

    const pct = ((state.totalAtStart - state.queue.length) / state.totalAtStart) * 100;
    $('progress-fill').style.width = `${pct}%`;
    $('queue-text').textContent = `Cards Left: ${state.queue.length}`;
    show('skip-btn');

    const item = state.queue[0];
    $('target-word').textContent = item.question.toLowerCase();
    $('target-pron').textContent = (item.dir === 'Rus ➔ Eng' && item.pron)
        ? `[${item.pron.toLowerCase()}]` : '';
    hide('ans-box');

    const useMC = Math.random() > 0.4 && state.masterList.length >= 8;
    useMC ? setupMC(item) : setupOpen(item);
}

function setupMC(item) {
    $('mode-label').textContent = 'Multiple Choice';
    show('mc-ui');
    hide('open-ui');

    const sameDir = state.masterList.filter(m => m.dir === item.dir).map(m => m.answer);
    const choices = [item.answer];
    const pool = sameDir.filter(a => a !== item.answer).sort(() => Math.random() - 0.5);
    for (const a of pool) {
        if (choices.length >= 4) break;
        choices.push(a);
    }
    choices.sort(() => Math.random() - 0.5);

    const container = $('mc-ui');
    container.innerHTML = '';
    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = choice.toLowerCase();
        btn.addEventListener('click', () => {
            if (choice === item.answer) {
                state.score++;
                $('score-text').textContent = `Score: ${state.score}`;
                handleResult(true);
            } else {
                const pronHint = item.pron
                    ? `<div style="color:var(--accent);font-style:italic;margin-top:4px;">[${item.pron.toLowerCase()}]</div>`
                    : '';
                const bodyHTML =
                    `<div style="font-size:1.3rem;font-weight:800;color:var(--primary);margin-bottom:12px;">"${item.question.toLowerCase()}"</div>` +
                    `The correct answer was:<br><strong style="font-size:1.2rem;">${item.answer.toLowerCase()}</strong>${pronHint}`;
                showModal('❌ Not quite!', bodyHTML, () => handleResult(false));
            }
        });
        container.appendChild(btn);
    });
}

function setupOpen(item) {
    $('mode-label').textContent = 'Open Recall';
    hide('mc-ui');
    show('open-ui');

    if (item.dir === 'Eng ➔ Rus' && item.pron) {
        $('correct-ans').innerHTML =
            `${item.answer.toLowerCase()}<div style="color:var(--accent);font-style:italic;font-size:1rem;margin-top:8px;">[${item.pron.toLowerCase()}]</div>`;
    } else {
        $('correct-ans').textContent = item.answer.toLowerCase();
    }
}

function showOpenAnswer() {
    show('ans-box');
    hide('skip-btn');
}

function handleIDontKnow() {
    const item = state.queue[0];
    const pronHint = item.pron
        ? `<div style="color:var(--accent);font-style:italic;margin-top:4px;">[${item.pron.toLowerCase()}]</div>`
        : '';
    const bodyHTML =
        `<div style="font-size:1.3rem;font-weight:800;color:var(--primary);margin-bottom:12px;">"${item.question.toLowerCase()}"</div>` +
        `The answer is:<br><strong style="font-size:1.2rem;">${item.answer.toLowerCase()}</strong>${pronHint}`;
    showModal('📖 Study This Word', bodyHTML, () => handleResult(false));
}

function handleResult(correct) {
    const item = state.queue.shift();
    if (!correct) state.queue.push(item);
    nextQuestion();
}

// ── PWA service worker ─────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {/* offline support optional */});
}
</script>
</body>
</html>
